{% extends 'tienda/base.html' %}

{% block title %}Eliminar producto — TechStore{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="fw-bold mb-3">Eliminar producto</h2>
        <p>¿Seguro que deseas eliminar <strong>{{ producto.nombre }}</strong>?</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'admin_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
